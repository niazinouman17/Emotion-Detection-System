<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detection</title>
    <style>
        /* General Styling */
        body {
            font-family: Arial, sans-serif;
            background: url(images/WhatsApp_Image_2024-11-07_at_9.22.01_AM_batcheditor_fotor.jpeg) no-repeat;
            background-size: 100% 100%; 
          
            display: flex;
            justify-content: center;
            align-items: center;
          
            
            background-color: black; /* Fills the gaps with black color */
        }

        /* Form Styling */
        form {
            background: rgba(0, 0, 0, 0.7); /* Semi-transparent black form */
            padding: 0px 10px; /* Reduced padding */
            border-radius: 2px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.6); /* Adds depth with shadow */
            width: 300px; /* Reduced width */
            text-align: center;
            color: #fff;
        }

        h1 {
            margin-bottom: 15px; /* Reduced margin */
            font-size: 1.5em; /* Slightly smaller font size */
            color: #fff;
        }

        label {
            display: block;
            margin: 8px 0 4px; /* Reduced margin */
            color: #ddd;
            font-size: 0.85em; /* Slightly smaller font size */
            text-align: left;
        }

        input, select, button {
            width: calc(100% - 20px); /* Adjusted to fit smaller form size */
            padding: 8px; /* Reduced padding */
            margin-bottom: 12px; /* Reduced margin */
            border: 1px solid #555;
            border-radius: 5px;
            font-size: 0.85em; /* Slightly smaller font size */
            background: rgba(255, 255, 255, 0.1); /* Transparent input fields */
            color: #fff;
        }

        input::placeholder {
            color: #ccc;
        }

        button {
            background: #5a67d8;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 0.9em; /* Slightly smaller font size */
            font-weight: bold;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #4c51bf;
        }

        /* Ensure no extra white spaces appear */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

    </style>
</head>
<body>
    <form action="process_audio.php" method="POST" enctype="multipart/form-data">
        <h1>Emotion Detection</h1>
        <label for="name">Name:</label>
        <input type="text" name="name" id="name" placeholder="Enter your name" required>
        
        <label for="age">Age:</label>
        <input type="number" name="age" id="age" placeholder="Enter your age" required>
        
        <label for="gender">Gender:</label>
        <select name="gender" id="gender" required>
            <option value="" disabled selected>Select your gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
        </select>
        
        <label for="audio">Upload Audio:</label>
        <input type="file" name="audio" id="audio" accept="audio/*" required>
        
        <button type="submit">Submit</button>
    </form>
</body>
</html>
